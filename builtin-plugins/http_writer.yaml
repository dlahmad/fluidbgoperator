apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: http-writer
spec:
  description: "HTTP writer gateway for injecting HTTP requests into blue"
  image: fluidbg/http-writer:v0.1.0
  topology: standalone
  modes: [write]
  directions: [ingress, egress]
  fieldNamespaces: [http]
  configSchema:
    type: object
    required: [targetUrl, writeEnvVar]
    properties:
      targetUrl: { type: string }
      writeEnvVar: { type: string }
  container:
    ports:
      - name: http
        containerPort: 9090
    volumeMounts:
      - name: plugin-config
        mountPath: /etc/fluidbg
        readOnly: true
  injects:
    testContainer:
      env:
        - nameFromConfig: writeEnvVar
          valueTemplate: "http://fluidbg-writer-{inceptionPoint}:9090"
