apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: rabbitmq-writer
spec:
  description: "RabbitMQ writer gateway for injecting messages into blue's queues"
  image: fluidbg/rabbitmq-writer:v0.1.0
  topology: standalone
  modes: [write]
  directions: [ingress, egress]
  fieldNamespaces: [queue]
  configSchema:
    type: object
    required: [targetQueue, writeEnvVar]
    properties:
      targetQueue: { type: string }
      amqpUrl: { type: string }
      writeEnvVar: { type: string }
  container:
    ports:
      - name: http
        containerPort: 9090
    volumeMounts:
      - name: plugin-config
        mountPath: /etc/fluidbg
        readOnly: true
  injects:
    testContainer:
      env:
        - nameFromConfig: writeEnvVar
          valueTemplate: "http://fluidbg-writer-{inceptionPoint}:9090"
