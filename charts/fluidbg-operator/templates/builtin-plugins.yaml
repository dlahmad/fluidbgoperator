{{- define "fluidbg.builtinPluginManifests" -}}
{{- $root := . -}}
{{- $namespaces := .Values.builtinPlugins.namespaces | default (list .Release.Namespace) -}}
{{- range $namespace := $namespaces }}
{{- if $root.Values.builtinPlugins.rabbitmq.enabled }}
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: rabbitmq
  namespace: {{ $namespace }}
  labels:
    {{- include "fluidbg.labels" $root | nindent 4 }}
spec:
  description: "RabbitMQ transport plugin"
  image: "{{ $root.Values.builtinPlugins.rabbitmq.image.repository }}:{{ $root.Values.builtinPlugins.rabbitmq.image.tag | default $root.Chart.AppVersion }}"
  supportedRoles: [duplicator, splitter, observer, writer, consumer, combiner]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    drainPath: /drain
    drainStatusPath: /drain-status
    cleanupPath: /cleanup
    trafficShiftPath: /traffic
  features:
    supportsProgressiveShifting: true
  {{- if $root.Values.builtinPlugins.rabbitmq.manager.enabled }}
  manager:
    serviceName: fluidbg-rabbitmq-manager
    namespace: {{ $root.Release.Namespace }}
    port: 9090
    preparePath: /manager/prepare
    cleanupPath: /manager/cleanup
  {{- end }}
  fieldNamespaces: [queue]
  configSchema:
    type: object
    properties:
      amqpUrl: { type: string }
      management:
        type: object
        properties:
          url: { type: string }
          username: { type: string }
          password: { type: string }
          vhost: { type: string }
      queueDeclaration:
        type: object
        properties:
          durable: { type: boolean }
          exclusive: { type: boolean }
          autoDelete: { type: boolean }
          arguments: { type: object }
      shadowQueue:
        type: object
        properties:
          suffix: { type: string }
          queueDeclaration:
            type: object
            properties:
              durable: { type: boolean }
              exclusive: { type: boolean }
              autoDelete: { type: boolean }
              arguments: { type: object }
      duplicator:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      splitter:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      combiner:
        type: object
        properties:
          outputQueue: { type: string }
          greenOutputQueue: { type: string }
          blueOutputQueue: { type: string }
          greenOutputQueueEnvVar: { type: string }
          blueOutputQueueEnvVar: { type: string }
      writer:
        type: object
        properties:
          targetQueue: { type: string }
      consumer:
        type: object
        properties:
          inputQueue: { type: string }
      observer:
        type: object
        properties:
          testId: { type: object }
          match: { type: array }
          notifyPath: { type: string }
  inceptor:
    ports:
      - name: health
        containerPort: 9090
{{- end }}
{{- if $root.Values.builtinPlugins.http.enabled }}
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: http
  namespace: {{ $namespace }}
  labels:
    {{- include "fluidbg.labels" $root | nindent 4 }}
spec:
  description: "HTTP transport plugin for observing, mocking, and writing HTTP traffic"
  image: "{{ $root.Values.builtinPlugins.http.image.repository }}:{{ $root.Values.builtinPlugins.http.image.tag | default $root.Chart.AppVersion }}"
  supportedRoles: [splitter, observer, mock, writer]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    drainPath: /drain
    drainStatusPath: /drain-status
    cleanupPath: /cleanup
    trafficShiftPath: /traffic
  features:
    supportsProgressiveShifting: true
  fieldNamespaces: [http]
  configSchema:
    type: object
    properties:
      port: { type: integer }
      proxyPort: { type: integer }
      realEndpoint: { type: string }
      targetUrl: { type: string }
      greenEndpoint: { type: string }
      blueEndpoint: { type: string }
      envVarName: { type: string }
      writeEnvVar: { type: string }
      ingressPort: { type: integer }
      egressPort: { type: integer }
      testId: { type: object }
      match: { type: array }
      filters: { type: array }
      ingress: { type: object }
      egress: { type: object }
  inceptor:
    ports:
      - name: http
        containerPort: 9090
    volumeMounts:
      - name: plugin-config
        mountPath: /etc/fluidbg
        readOnly: true
  injects:
    blueContainer:
      env:
        - nameFromConfig: envVarName
          valueTemplate: "http://{{`{{pluginServiceName}}`}}:9090"
          restoreValueTemplate: "{{`{{realEndpoint}}`}}"
    testContainer:
      env:
        - nameFromConfig: writeEnvVar
          valueTemplate: "http://{{`{{pluginServiceName}}`}}:9090"
{{- end }}
{{- if $root.Values.builtinPlugins.azureServiceBus.enabled }}
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: azure-servicebus
  namespace: {{ $namespace }}
  labels:
    {{- include "fluidbg.labels" $root | nindent 4 }}
spec:
  description: "Azure Service Bus transport plugin"
  image: "{{ $root.Values.builtinPlugins.azureServiceBus.image.repository }}:{{ $root.Values.builtinPlugins.azureServiceBus.image.tag | default $root.Chart.AppVersion }}"
  supportedRoles: [duplicator, splitter, observer, writer, consumer, combiner]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    drainPath: /drain
    drainStatusPath: /drain-status
    cleanupPath: /cleanup
    trafficShiftPath: /traffic
  features:
    supportsProgressiveShifting: true
  {{- if $root.Values.builtinPlugins.azureServiceBus.manager.enabled }}
  manager:
    serviceName: fluidbg-azure-servicebus-manager
    namespace: {{ $root.Release.Namespace }}
    port: 9090
    preparePath: /manager/prepare
    cleanupPath: /manager/cleanup
  {{- end }}
  fieldNamespaces: [queue, servicebus]
  configSchema:
    type: object
    properties:
      connectionString: { type: string }
      fullyQualifiedNamespace: { type: string }
      auth:
        type: object
        properties:
          mode:
            type: string
            enum: [connectionString, workloadIdentity]
          tenantId: { type: string }
          clientId: { type: string }
          federatedTokenFile: { type: string }
          authorityHost: { type: string }
          sasTokenTtlSeconds: { type: integer }
      management:
        type: object
        properties:
          subscriptionId: { type: string }
          resourceGroup: { type: string }
          namespaceName: { type: string }
          createQueues: { type: boolean }
          deleteQueues: { type: boolean }
      queueDeclaration:
        type: object
        properties:
          lockDuration: { type: string }
          maxSizeInMegabytes: { type: integer }
          maxMessageSizeInKilobytes: { type: integer }
          requiresDuplicateDetection: { type: boolean }
          requiresSession: { type: boolean }
          defaultMessageTimeToLive: { type: string }
          deadLetteringOnMessageExpiration: { type: boolean }
          duplicateDetectionHistoryTimeWindow: { type: string }
          maxDeliveryCount: { type: integer }
          enableBatchedOperations: { type: boolean }
          autoDeleteOnIdle: { type: string }
          enablePartitioning: { type: boolean }
          enableExpress: { type: boolean }
          forwardTo: { type: string }
          forwardDeadLetteredMessagesTo: { type: string }
          status: { type: string }
      shadowQueue:
        type: object
        properties:
          suffix: { type: string }
          queueDeclaration:
            type: object
            properties:
              lockDuration: { type: string }
              maxSizeInMegabytes: { type: integer }
              maxMessageSizeInKilobytes: { type: integer }
              requiresDuplicateDetection: { type: boolean }
              requiresSession: { type: boolean }
              defaultMessageTimeToLive: { type: string }
              deadLetteringOnMessageExpiration: { type: boolean }
              duplicateDetectionHistoryTimeWindow: { type: string }
              maxDeliveryCount: { type: integer }
              enableBatchedOperations: { type: boolean }
              autoDeleteOnIdle: { type: string }
              enablePartitioning: { type: boolean }
              enableExpress: { type: boolean }
              forwardTo: { type: string }
              forwardDeadLetteredMessagesTo: { type: string }
              status: { type: string }
      duplicator:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      splitter:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      combiner:
        type: object
        properties:
          outputQueue: { type: string }
          greenOutputQueue: { type: string }
          blueOutputQueue: { type: string }
          greenOutputQueueEnvVar: { type: string }
          blueOutputQueueEnvVar: { type: string }
      writer:
        type: object
        properties:
          targetQueue: { type: string }
      consumer:
        type: object
        properties:
          inputQueue: { type: string }
      observer:
        type: object
        properties:
          testId: { type: object }
          match: { type: array }
          notifyPath: { type: string }
  inceptor:
    {{- if $root.Values.builtinPlugins.azureServiceBus.inceptorWorkloadIdentity.enabled }}
    podLabels:
      azure.workload.identity/use: "true"
      {{- with $root.Values.builtinPlugins.azureServiceBus.inceptorWorkloadIdentity.podLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
    {{- with $root.Values.builtinPlugins.azureServiceBus.inceptorWorkloadIdentity.podAnnotations }}
    podAnnotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $root.Values.builtinPlugins.azureServiceBus.inceptorWorkloadIdentity.serviceAccountName }}
    serviceAccountName: {{ . | quote }}
    {{- end }}
    {{- end }}
    ports:
      - name: health
        containerPort: 9090
{{- end }}
{{- end }}
{{- end -}}

{{- if .Values.builtinPlugins.install }}
{{- $hookName := printf "%s-builtin-plugin-hook" (include "fluidbg.fullname" .) | trunc 63 | trimSuffix "-" -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $hookName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade,pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $hookName }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade,pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fluidbg.io"]
    resources: ["inceptionplugins"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $hookName }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade,pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $hookName }}
subjects:
  - kind: ServiceAccount
    name: {{ $hookName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $hookName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade,pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  plugins.yaml: |
    {{- include "fluidbg.builtinPluginManifests" . | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-apply" $hookName | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fluidbg.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: builtin-plugin-hook
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $hookName }}
      containers:
        - name: builtin-plugin-hook
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - builtin-plugins
            - apply
            - /manifests/plugins.yaml
          volumeMounts:
            - name: builtin-plugin-manifests
              mountPath: /manifests
              readOnly: true
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
      volumes:
        - name: builtin-plugin-manifests
          configMap:
            name: {{ $hookName }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-delete" $hookName | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fluidbg.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: builtin-plugin-hook
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $hookName }}
      containers:
        - name: builtin-plugin-hook
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - builtin-plugins
            - delete
            - /manifests/plugins.yaml
          volumeMounts:
            - name: builtin-plugin-manifests
              mountPath: /manifests
              readOnly: true
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
      volumes:
        - name: builtin-plugin-manifests
          configMap:
            name: {{ $hookName }}
{{- end }}
