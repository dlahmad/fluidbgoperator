{{- if .Values.operator.auth.createSigningSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.operator.auth.signingSecretName | quote }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ required "operator.auth.signingSecretKey is required when operator.auth.createSigningSecret=true" .Values.operator.auth.signingSecretKey }}: {{ required "operator.auth.signingSecretValue is required when operator.auth.createSigningSecret=true" .Values.operator.auth.signingSecretValue | quote }}
{{- end }}
