{{- if and (eq .Values.stateStore.type "postgres") (ne .Values.stateStore.postgres.authMode "workloadIdentity") (not .Values.stateStore.postgres.urlSecretName) .Values.stateStore.postgres.url }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fluidbg.postgresSecretName" . | quote }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.stateStore.postgres.urlSecretKey }}: {{ .Values.stateStore.postgres.url | quote }}
{{- end }}
{{- if and (eq .Values.stateStore.type "cosmosdb") (eq .Values.stateStore.cosmos.authMode "connectionString") (not .Values.stateStore.cosmos.connectionStringSecretName) .Values.stateStore.cosmos.connectionString }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fluidbg.cosmosConnectionStringSecretName" . | quote }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.stateStore.cosmos.connectionStringSecretKey }}: {{ .Values.stateStore.cosmos.connectionString | quote }}
{{- end }}
{{- if and (eq .Values.stateStore.type "cosmosdb") (eq .Values.stateStore.cosmos.authMode "accountKey") (not .Values.stateStore.cosmos.accountKeySecretName) .Values.stateStore.cosmos.accountKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fluidbg.cosmosAccountKeySecretName" . | quote }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.stateStore.cosmos.accountKeySecretKey }}: {{ .Values.stateStore.cosmos.accountKey | quote }}
{{- end }}
{{- if and .Values.builtinPlugins.install .Values.builtinPlugins.rabbitmq.enabled .Values.builtinPlugins.rabbitmq.manager.enabled (not .Values.builtinPlugins.rabbitmq.manager.amqpUrlSecretName) (or .Values.builtinPlugins.rabbitmq.manager.amqpUrl .Values.builtinPlugins.rabbitmq.manager.managementUrl .Values.builtinPlugins.rabbitmq.manager.managementUsername .Values.builtinPlugins.rabbitmq.manager.managementPassword) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fluidbg.rabbitmqManagerSecretName" . | quote }}
  labels:
    {{- include "fluidbg.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.builtinPlugins.rabbitmq.manager.amqpUrl }}
  {{ $.Values.builtinPlugins.rabbitmq.manager.amqpUrlSecretKey }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.builtinPlugins.rabbitmq.manager.managementUrl }}
  {{ $.Values.builtinPlugins.rabbitmq.manager.managementUrlSecretKey }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.builtinPlugins.rabbitmq.manager.managementUsername }}
  {{ $.Values.builtinPlugins.rabbitmq.manager.managementUsernameSecretKey }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.builtinPlugins.rabbitmq.manager.managementPassword }}
  {{ $.Values.builtinPlugins.rabbitmq.manager.managementPasswordSecretKey }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.builtinPlugins.rabbitmq.manager.managementVhost }}
  {{ $.Values.builtinPlugins.rabbitmq.manager.managementVhostSecretKey }}: {{ . | quote }}
  {{- end }}
{{- end }}
