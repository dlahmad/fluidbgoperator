nameOverride: ""
fullnameOverride: ""

global:
  # Shared image tag for the operator and all built-in plugin images. Empty
  # defaults to Chart.appVersion. Component-specific image.tag values override
  # this value.
  imageTag: ""

operator:
  replicaCount: 1
  image:
    repository: ghcr.io/dlahmad/fbg-operator
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  rustLog: info
  auth:
    createSigningSecret: false
    signingSecretNamespace: ""
    signingSecretName: fluidbg-operator-auth
    signingSecretKey: signing-key
    signingSecretValue: ""
  api:
    port: 8090
  orphanCleanup:
    intervalSeconds: 60
  reconcileLease:
    durationSeconds: 30
    renewIntervalSeconds: 10
  nodeSelector: {}
  tolerations: []
  affinity: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop: ["ALL"]
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

service:
  type: ClusterIP
  port: 8090

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

stateStore:
  # The operator process uses one global backend for all watched BGDs.
  type: memory
  postgres:
    authMode: password
    url: ""
    urlSecretName: ""
    urlSecretKey: url
    host: ""
    database: ""
    user: ""
    tableName: fluidbg_cases
    workloadIdentity:
      tenantId: ""
      clientId: ""
      federatedTokenFile: ""
      authorityHost: ""
  cosmos:
    authMode: connectionString
    endpoint: ""
    database: ""
    container: ""
    connectionString: ""
    connectionStringSecretName: ""
    connectionStringSecretKey: connection-string
    accountKey: ""
    accountKeySecretName: ""
    accountKeySecretKey: account-key
    workloadIdentity:
      tenantId: ""
      clientId: ""
      federatedTokenFile: ""
      authorityHost: ""

builtinPlugins:
  install: true
  # InceptionPlugin resources are namespaced and are resolved in the same
  # namespace as the BlueGreenDeployment. Leave empty to install into the Helm
  # release namespace. Add application namespaces that should use the built-ins.
  namespaces: []
  http:
    enabled: true
    image:
      repository: ghcr.io/dlahmad/fbg-plugin-http
      tag: ""
  rabbitmq:
    enabled: true
    image:
      repository: ghcr.io/dlahmad/fbg-plugin-rabbitmq
      tag: ""
    manager:
      enabled: false
      amqpUrl: ""
      amqpUrlSecretName: ""
      amqpUrlSecretKey: amqp-url
      managementUrl: ""
      managementUrlSecretKey: management-url
      managementUsername: ""
      managementUsernameSecretKey: management-username
      managementPassword: ""
      managementPasswordSecretKey: management-password
      managementVhost: "/"
      managementVhostSecretKey: management-vhost
      podAnnotations: {}
      podLabels: {}
      resources: {}
  azureServiceBus:
    enabled: true
    inceptorWorkloadIdentity:
      enabled: false
      serviceAccountName: ""
      podAnnotations: {}
      podLabels: {}
    manager:
      enabled: false
      connectionStringSecretName: ""
      connectionStringSecretKey: connection-string
      fullyQualifiedNamespace: ""
      authMode: ""
      subscriptionId: ""
      resourceGroup: ""
      namespaceName: ""
      workloadIdentity:
        enabled: false
        serviceAccountName: ""
        podAnnotations: {}
        podLabels: {}
      podAnnotations: {}
      podLabels: {}
      resources: {}
    image:
      repository: ghcr.io/dlahmad/fbg-plugin-azure-servicebus
      tag: ""
