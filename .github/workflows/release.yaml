name: Release

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, for manual publishing"
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMES: fbg-operator fbg-plugin-http fbg-plugin-rabbitmq fbg-plugin-azure-servicebus

jobs:
  publish-images:
    name: Publish container images (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build release binaries
        timeout-minutes: 60
        run: ./scripts/build-linux-binaries.sh --local --arch "${{ matrix.arch }}"
      - name: Package executable artifacts
        run: |
          mkdir -p dist/release
          tar -C dist -czf "dist/release/fluidbg-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz" \
            fluidbg-operator \
            fluidbg-http \
            fluidbg-rabbitmq \
            fluidbg-azure-servicebus
          sha256sum "dist/release/fluidbg-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz" \
            > "dist/release/fluidbg-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz.sha256"
      - name: Upload executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-linux-${{ matrix.arch }}
          path: |
            dist/release/fluidbg-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz
            dist/release/fluidbg-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz.sha256
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          ./scripts/build-images.sh \
            --registry "${REGISTRY}/${{ steps.image_namespace.outputs.value }}" \
            --tag "${{ steps.version.outputs.value }}-${{ matrix.arch }}" \
            --tag "latest-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --push

  publish-manifests:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish manifests
        run: |
          set -euo pipefail
          for image in ${IMAGE_NAMES}; do
            base="${REGISTRY}/${{ steps.image_namespace.outputs.value }}/${image}"
            docker buildx imagetools create \
              -t "${base}:${{ steps.version.outputs.value }}" \
              "${base}:${{ steps.version.outputs.value }}-amd64" \
              "${base}:${{ steps.version.outputs.value }}-arm64"
            docker buildx imagetools create \
              -t "${base}:latest" \
              "${base}:latest-amd64" \
              "${base}:latest-arm64"
          done

  package-helm:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: publish-manifests
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          helm lint charts/fluidbg-operator
          helm package charts/fluidbg-operator \
            --version "${{ steps.version.outputs.value }}" \
            --app-version "${{ steps.version.outputs.value }}" \
            --destination dist/charts
      - name: Login to GHCR Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin
      - name: Publish chart to GHCR OCI
        run: helm push dist/charts/*.tgz "oci://${REGISTRY}/${{ steps.image_namespace.outputs.value }}/charts"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-operator-chart
          path: dist/charts/*.tgz

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [publish-images, package-helm]
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
      - name: Build checksum manifest
        run: |
          set -euo pipefail
          find dist/release -type f \( -name '*.tar.gz' -o -name '*.tgz' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/release/SHA256SUMS
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.value }}"
          notes="$(cat <<NOTES
          FluidBG Operator $tag release.

          Container images are published to GHCR and are not attached as release files.
          Attached release files contain executable archives, checksums, and the Helm chart package.
          NOTES
          )"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/release/**/*.tar.gz \
              dist/release/**/*.tgz \
              dist/release/**/*.sha256 \
              dist/release/SHA256SUMS \
              --clobber
          else
            gh release create "$tag" \
              dist/release/**/*.tar.gz \
              dist/release/**/*.tgz \
              dist/release/**/*.sha256 \
              dist/release/SHA256SUMS \
              --title "$tag" \
              --notes "$notes"
          fi
