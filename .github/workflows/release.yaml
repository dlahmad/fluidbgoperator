name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, for manual publishing"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMES: operator http rabbitmq

jobs:
  publish-images:
    name: Publish container images (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build release binaries
        run: ./scripts/build-linux-binaries.sh --arch "${{ matrix.arch }}"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          ./scripts/build-images.sh \
            --registry "${REGISTRY}/${{ steps.image_namespace.outputs.value }}" \
            --tag "${{ steps.version.outputs.value }}-${{ matrix.arch }}" \
            --tag "latest-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --push

  publish-manifests:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish manifests
        run: |
          set -euo pipefail
          for image in ${IMAGE_NAMES}; do
            base="${REGISTRY}/${{ steps.image_namespace.outputs.value }}/${image}"
            docker buildx imagetools create \
              -t "${base}:${{ steps.version.outputs.value }}" \
              "${base}:${{ steps.version.outputs.value }}-amd64" \
              "${base}:${{ steps.version.outputs.value }}-arm64"
            docker buildx imagetools create \
              -t "${base}:latest" \
              "${base}:latest-amd64" \
              "${base}:latest-arm64"
          done

  package-helm:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: publish-manifests
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          helm lint charts/fluidbg-operator
          helm package charts/fluidbg-operator \
            --version "${{ steps.version.outputs.value }}" \
            --app-version "${{ steps.version.outputs.value }}" \
            --destination dist/charts
      - name: Login to GHCR Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin
      - name: Publish chart to GHCR OCI
        run: helm push dist/charts/*.tgz "oci://${REGISTRY}/${{ steps.image_namespace.outputs.value }}/charts"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-operator-chart
          path: dist/charts/*.tgz
