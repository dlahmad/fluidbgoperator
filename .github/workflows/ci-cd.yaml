name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run the full kind e2e suite."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAMES: fbg-operator fbg-plugin-http fbg-plugin-rabbitmq fbg-plugin-azure-servicebus
  EXAMPLE_IMAGE_NAMES: fluidbg-example-order-app fluidbg-example-producer fluidbg-example-sink fluidbg-example-verifier

jobs:
  resolve:
    name: Resolve build context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.context.outputs.version }}
      tag: ${{ steps.context.outputs.tag }}
      is_release: ${{ steps.context.outputs.is_release }}
      image_namespace: ${{ steps.context.outputs.image_namespace }}
      run_e2e: ${{ steps.context.outputs.run_e2e }}
    steps:
      - id: context
        env:
          INPUT_RUN_E2E: ${{ inputs.run_e2e || false }}
        run: |
          set -euo pipefail
          image_namespace="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          is_release=false
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="$GITHUB_REF_NAME"
            is_release=true
          else
            version="dev"
            tag=""
          fi
          run_e2e=false
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$INPUT_RUN_E2E" = "true" ] || [ "$is_release" = "true" ]; then
            run_e2e=true
          fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "is_release=$is_release"
            echo "image_namespace=$image_namespace"
            echo "run_e2e=$run_e2e"
          } >> "$GITHUB_OUTPUT"

  checks:
    name: Rust, Python, and shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-host
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Compile e2e Python apps
        run: |
          python -m py_compile \
            e2e/blue-app/app.py \
            e2e/green-app/app.py \
            e2e/test-app/app.py \
            examples/sequential-bgd/app/app.py \
            examples/sequential-bgd/producer/producer.py \
            examples/sequential-bgd/sink/sink.py \
            examples/sequential-bgd/verifier/verifier.py
      - name: Check shell scripts
        run: |
          bash -n e2e/run-test.sh
          bash -n scripts/build-linux-binaries.sh
          bash -n scripts/build-images.sh
          bash -n scripts/build-example-images.sh

  manifests:
    name: CRDs and Helm templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: azure/setup-helm@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-host
      - name: Regenerate CRDs
        run: cargo run --locked --bin gen-crds
      - name: Verify generated CRDs are committed
        run: git diff --exit-code -- crds charts/fluidbg-operator/crds
      - name: Verify chart CRDs mirror generated CRDs
        run: |
          cmp crds/blue_green_deployment.yaml charts/fluidbg-operator/crds/blue_green_deployment.yaml
          cmp crds/inception_plugin.yaml charts/fluidbg-operator/crds/inception_plugin.yaml
      - name: Lint Helm chart
        run: helm lint charts/fluidbg-operator
      - name: Render Helm chart
        run: helm template fluidbg charts/fluidbg-operator --namespace fluidbg-system >/tmp/fluidbg-rendered.yaml

  build-binaries:
    name: Build Linux musl binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-linux-${{ matrix.arch }}-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Build release binaries
        run: ./scripts/build-linux-binaries.sh --local --arch "${{ matrix.arch }}"
      - name: Package executable archive
        run: |
          mkdir -p dist/release
          tar -C dist -czf "dist/release/fluidbg-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz" \
            fluidbg-operator \
            fluidbg-http \
            fluidbg-rabbitmq \
            fluidbg-azure-servicebus
          sha256sum "dist/release/fluidbg-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz" \
            > "dist/release/fluidbg-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256"
      - name: Upload raw executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-dist-${{ matrix.arch }}
          path: |
            dist/fluidbg-operator
            dist/fluidbg-http
            dist/fluidbg-rabbitmq
            dist/fluidbg-azure-servicebus
      - name: Upload release executable archive
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-release-linux-${{ matrix.arch }}
          path: |
            dist/release/fluidbg-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz
            dist/release/fluidbg-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256

  docs:
    name: Build GitHub Pages docs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - name: Assemble docs source
        run: |
          mkdir -p docs/reference
          cp -R sdk/spec docs/reference/sdk-spec
      - uses: actions/jekyll-build-pages@v1
        with:
          source: docs
          destination: _site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy-docs:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  kind-e2e:
    name: Kind end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [resolve, build-binaries]
    if: needs.resolve.outputs.run_e2e == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: fluidbg-dev
          config: testenv/kind-config.yaml
      - uses: docker/setup-buildx-action@v3
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-host
      - uses: actions/download-artifact@v4
        with:
          name: fluidbg-dist-amd64
          path: dist
      - name: Build and load e2e images
        run: |
          set -euo pipefail
          chmod +x dist/fluidbg-operator dist/fluidbg-http dist/fluidbg-rabbitmq dist/fluidbg-azure-servicebus
          ./scripts/build-images.sh --tag dev --platform linux/amd64
          docker build -t fluidbg/blue-app:dev e2e/blue-app
          docker build -t fluidbg/green-app:dev e2e/green-app
          docker build -t fluidbg/test-app:dev e2e/test-app
          kind load docker-image fluidbg/fbg-operator:dev --name fluidbg-dev
          kind load docker-image fluidbg/fbg-plugin-http:dev --name fluidbg-dev
          kind load docker-image fluidbg/fbg-plugin-rabbitmq:dev --name fluidbg-dev
          kind load docker-image fluidbg/fbg-plugin-azure-servicebus:dev --name fluidbg-dev
          kind load docker-image fluidbg/blue-app:dev --name fluidbg-dev
          kind load docker-image fluidbg/green-app:dev --name fluidbg-dev
          kind load docker-image fluidbg/test-app:dev --name fluidbg-dev
      - name: Run full e2e
        env:
          KIND_CLUSTER: fluidbg-dev
          BUILD_IMAGES: "0"
        run: ./e2e/run-test.sh

  image-build:
    name: Build container images (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: [resolve, checks, build-binaries, kind-e2e]
    if: |
      always() &&
      github.event_name != 'schedule' &&
      needs.checks.result == 'success' &&
      needs.build-binaries.result == 'success' &&
      (needs.kind-e2e.result == 'success' || needs.kind-e2e.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: actions/download-artifact@v4
        with:
          name: fluidbg-dist-${{ matrix.arch }}
          path: dist
      - name: Prepare executable artifacts
        run: chmod +x dist/fluidbg-operator dist/fluidbg-http dist/fluidbg-rabbitmq dist/fluidbg-azure-servicebus
      - name: Resolve image namespace
        id: image_namespace
        run: echo "value=${{ needs.resolve.outputs.image_namespace }}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build local images
        if: needs.resolve.outputs.is_release != 'true'
        env:
          DOCKER_BUILD_CACHE_FROM: ${{ format('type=registry,ref={0}/{1}/fluidbg-build-cache:images-{2}', env.REGISTRY, steps.image_namespace.outputs.value, matrix.arch) }}
          DOCKER_BUILD_CACHE_TO: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}/fluidbg-build-cache:images-{2},mode=max', env.REGISTRY, steps.image_namespace.outputs.value, matrix.arch) || '' }}
        run: |
          ./scripts/build-images.sh \
            --tag "ci-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}"
          ./scripts/build-example-images.sh \
            --tag "ci-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}"
      - name: Build and push release images
        if: needs.resolve.outputs.is_release == 'true'
        env:
          DOCKER_BUILD_CACHE_FROM: ${{ format('type=registry,ref={0}/{1}/fluidbg-build-cache:images-{2}', env.REGISTRY, steps.image_namespace.outputs.value, matrix.arch) }}
          DOCKER_BUILD_CACHE_TO: ${{ format('type=registry,ref={0}/{1}/fluidbg-build-cache:images-{2},mode=max', env.REGISTRY, steps.image_namespace.outputs.value, matrix.arch) }}
        run: |
          ./scripts/build-images.sh \
            --registry "${REGISTRY}/${{ steps.image_namespace.outputs.value }}" \
            --tag "${{ needs.resolve.outputs.version }}-${{ matrix.arch }}" \
            --tag "latest-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --push
          ./scripts/build-example-images.sh \
            --registry "${REGISTRY}/${{ steps.image_namespace.outputs.value }}" \
            --tag "${{ needs.resolve.outputs.version }}-${{ matrix.arch }}" \
            --tag "latest-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --push

  publish-manifests:
    name: Publish multi-arch image manifests
    runs-on: ubuntu-latest
    needs: [resolve, image-build]
    if: needs.resolve.outputs.is_release == 'true'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish manifests
        run: |
          set -euo pipefail
          for image in ${IMAGE_NAMES} ${EXAMPLE_IMAGE_NAMES}; do
            base="${REGISTRY}/${{ needs.resolve.outputs.image_namespace }}/${image}"
            docker buildx imagetools create \
              -t "${base}:${{ needs.resolve.outputs.version }}" \
              "${base}:${{ needs.resolve.outputs.version }}-amd64" \
              "${base}:${{ needs.resolve.outputs.version }}-arm64"
            docker buildx imagetools create \
              -t "${base}:latest" \
              "${base}:latest-amd64" \
              "${base}:latest-arm64"
          done

  package-helm:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: [resolve, manifests, kind-e2e]
    if: |
      always() &&
      needs.resolve.outputs.is_release == 'true' &&
      needs.manifests.result == 'success' &&
      needs.kind-e2e.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: Package chart
        run: |
          helm lint charts/fluidbg-operator
          helm package charts/fluidbg-operator \
            --version "${{ needs.resolve.outputs.version }}" \
            --app-version "${{ needs.resolve.outputs.version }}" \
            --destination dist/charts
      - name: Login to GHCR Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin
      - name: Publish chart to GHCR OCI
        run: helm push dist/charts/*.tgz "oci://${REGISTRY}/${{ needs.resolve.outputs.image_namespace }}/charts"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluidbg-operator-chart
          path: dist/charts/*.tgz

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [resolve, build-binaries, publish-manifests, package-helm]
    if: needs.resolve.outputs.is_release == 'true'
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "fluidbg-release-linux-*"
          path: dist/release
          merge-multiple: true
      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: fluidbg-operator-chart
          path: dist/release
      - name: Build checksum manifest
        run: |
          set -euo pipefail
          find dist/release -type f \( -name '*.tar.gz' -o -name '*.tgz' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/release/SHA256SUMS
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve.outputs.tag }}"
          notes="$(cat <<NOTES
          FluidBG Operator $tag release.

          Container images are published to GHCR and are not attached as release files.
          Attached release files contain executable archives, checksums, and the Helm chart package.
          NOTES
          )"
          repo="${GITHUB_REPOSITORY}"
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/release/*.tar.gz \
              dist/release/*.tgz \
              dist/release/*.sha256 \
              dist/release/SHA256SUMS \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" \
              dist/release/*.tar.gz \
              dist/release/*.tgz \
              dist/release/*.sha256 \
              dist/release/SHA256SUMS \
              --repo "$repo" \
              --title "$tag" \
              --notes "$notes"
          fi
