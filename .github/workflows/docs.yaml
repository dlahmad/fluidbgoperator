name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble docs source
        run: |
          mkdir -p docs/reference docs/development
          {
            printf '%s\n' '---' 'title: Architecture' '---' ''
            cat ARCHITECTURE.md
          } > docs/reference/architecture.md
          {
            printf '%s\n' '---' 'title: Plugin Interface' '---' ''
            cat PLUGIN.md
          } > docs/reference/plugin-interface.md
          {
            printf '%s\n' '---' 'title: Implementation Plan' '---' ''
            cat IMPLEMENTATION_PLAN.md
          } > docs/development/implementation-plan.md
          cp -R sdk/spec docs/reference/sdk-spec
      - uses: actions/jekyll-build-pages@v1
        with:
          source: docs
          destination: _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
