name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust fmt, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-host
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --locked

  python-and-shell:
    name: Python and shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile e2e Python apps
        run: python -m py_compile e2e/blue-app/app.py e2e/green-app/app.py e2e/test-app/app.py
      - name: Check shell scripts
        run: |
          bash -n e2e/run-test.sh
          bash -n scripts/build-linux-binaries.sh
          bash -n scripts/build-images.sh

  manifests:
    name: CRDs and Helm templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: azure/setup-helm@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-manifests-host
      - name: Regenerate CRDs
        run: cargo run --locked --bin gen-crds
      - name: Verify generated CRDs are committed
        run: git diff --exit-code -- crds charts/fluidbg-operator/crds
      - name: Verify chart CRDs mirror generated CRDs
        run: |
          cmp crds/blue_green_deployment.yaml charts/fluidbg-operator/crds/blue_green_deployment.yaml
          cmp crds/inception_plugin.yaml charts/fluidbg-operator/crds/inception_plugin.yaml
      - name: Lint Helm chart
        run: helm lint charts/fluidbg-operator
      - name: Render Helm chart
        run: helm template fluidbg charts/fluidbg-operator --namespace fluidbg-system >/tmp/fluidbg-rendered.yaml

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [rust, python-and-shell]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-images-linux-amd64-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Build release binaries
        run: ./scripts/build-linux-binaries.sh --local --arch amd64
      - name: Build local images
        run: ./scripts/build-images.sh --tag ci
