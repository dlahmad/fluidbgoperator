<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  mermaid.initialize({
    startOnLoad: false,
    securityLevel: "loose",
    theme: "default",
    flowchart: {
      htmlLabels: true
    }
  });

  document.addEventListener("DOMContentLoaded", async () => {
    document.querySelectorAll("pre > code.language-mermaid, pre > code[data-lang='mermaid']").forEach((code) => {
      const diagram = document.createElement("div");
      diagram.className = "mermaid";
      diagram.textContent = code.textContent;
      const pre = code.parentElement;
      const figure = pre.parentElement && pre.parentElement.tagName === "FIGURE" ? pre.parentElement : null;
      (figure || pre).replaceWith(diagram);
    });

    if (document.querySelector(".mermaid")) {
      await mermaid.run({ querySelector: ".mermaid" });
    }
  });
</script>
