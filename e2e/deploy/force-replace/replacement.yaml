apiVersion: fluidbg.io/v1alpha1
kind: BlueGreenDeployment
metadata:
  name: order-processor-force-replace
  namespace: fluidbg-test
spec:
  updatePolicy:
    activeRollout: force-replace
  selector:
    matchLabels:
      fluidbg.io/name: order-processor
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: order-processor-blue
      template:
        metadata:
          labels:
            app: order-processor-blue
            fluidbg.io/name: order-processor
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: order-processor
              image: fluidbg/blue-app:dev
              imagePullPolicy: Never
              env:
                - name: AMQP_URL
                  value: amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/
                - name: INPUT_QUEUE
                  value: orders
                - name: OUTPUT_QUEUE
                  value: results
                - name: HTTP_UPSTREAM
                  value: http://httpbin.fluidbg-system/post
                - name: FORCE_REPLACE_GENERATION
                  value: replacement
  inceptionPoints:
    - name: incoming-orders
      pluginRef:
        name: rabbitmq
      roles:
        - duplicator
        - observer
      drain:
        maxWaitSeconds: 30
      config:
        shadowQueue:
          suffix: _dlq
          queueDeclaration:
            durable: true
        duplicator:
          inputQueue: orders
          greenInputQueue: orders-green
          blueInputQueue: orders-blue
          greenInputQueueEnvVar: INPUT_QUEUE
          blueInputQueueEnvVar: INPUT_QUEUE
          temporaryQueueIdentifier: force-replace-incoming
        observer:
          testId:
            field: queue.body
            jsonPath: $.orderId
          match:
            - field: queue.body
              jsonPath: $.action
              matches: ^force-replace-check$
          notifyPath: /observe/{testId}/incoming-orders
    - name: outgoing-results
      pluginRef:
        name: rabbitmq
      roles:
        - combiner
        - observer
      drain:
        maxWaitSeconds: 30
      config:
        shadowQueue:
          suffix: _dlq
          queueDeclaration:
            durable: true
        combiner:
          greenOutputQueueEnvVar: OUTPUT_QUEUE
          blueOutputQueueEnvVar: OUTPUT_QUEUE
          greenOutputQueue: results-green
          blueOutputQueue: results-blue
          outputQueue: results
          temporaryQueueIdentifier: force-replace-results
        observer:
          testId:
            field: queue.body
            jsonPath: $.orderId
          match:
            - field: queue.body
              jsonPath: $.originalMessage.action
              matches: ^force-replace-check$
          notifyPath: /observe/{testId}/outgoing-results
  test:
    name: test-container
    deployment:
      replicas: 1
      selector:
        matchLabels:
          app: test-container
      template:
        metadata:
          labels:
            app: test-container
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: test-container
              image: fluidbg/test-app:dev
              imagePullPolicy: Never
              ports:
                - containerPort: 8080
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 1
                failureThreshold: 60
              env:
                - name: PORT
                  value: "8080"
                - name: AMQP_URL
                  value: amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/
    service:
      selector:
        app: test-container
      ports:
        - port: 8080
          targetPort: 8080
    dataVerification:
      verifyPath: /result/{testId}
      timeoutSeconds: 120
  promotion:
    data:
      minTestCases: 3
      successRate: 1.0
      timeoutSeconds: 300
    strategy:
      type: hard-switch
