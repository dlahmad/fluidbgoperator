apiVersion: fluidbg.io/v1alpha1
kind: BlueGreenDeployment
metadata:
  name: order-processor-bootstrap
  namespace: fluidbg-test
spec:
  stateStoreRef:
    name: memory-store
  selector:
    matchLabels:
      fluidbg.io/name: order-processor
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: order-processor-green
      template:
        metadata:
          labels:
            app: order-processor-green
            fluidbg.io/name: order-processor
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: order-processor
              image: fluidbg/green-app:dev
              imagePullPolicy: Never
              env:
                - name: AMQP_URL
                  value: "amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/"
                - name: INPUT_QUEUE
                  value: "orders"
                - name: OUTPUT_QUEUE
                  value: "results"
                - name: HTTP_UPSTREAM
                  value: "http://httpbin.fluidbg-system/post"
  inceptionPoints: []
  tests: []
  promotion:
    data:
      minTestCases: 1
      successRate: 1.0
      timeoutSeconds: 120
    strategy:
      type: hard-switch
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: http
  namespace: fluidbg-test
spec:
  description: "HTTP transport plugin for observing, mocking, and writing HTTP traffic"
  image: fluidbg/http:dev
  supportedRoles: [splitter, observer, mock, writer]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    drainPath: /drain
    drainStatusPath: /drain-status
    cleanupPath: /cleanup
    trafficShiftPath: /traffic
  features:
    supportsProgressiveShifting: true
  fieldNamespaces: [http]
  configSchema:
    type: object
    properties:
      port: { type: integer }
      realEndpoint: { type: string }
      targetUrl: { type: string }
      greenEndpoint: { type: string }
      blueEndpoint: { type: string }
      envVarName: { type: string }
      writeEnvVar: { type: string }
      testId: { type: object }
      match: { type: array }
      filters: { type: array }
  container:
    ports:
      - name: http
        containerPort: 9090
  injects:
    blueContainer:
      env:
        - nameFromConfig: envVarName
          valueTemplate: "http://{{pluginServiceName}}:9090"
          restoreValueTemplate: "{{realEndpoint}}"
    testContainer:
      env:
        - nameFromConfig: writeEnvVar
          valueTemplate: "http://{{pluginServiceName}}:9090"
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: rabbitmq
  namespace: fluidbg-test
spec:
  description: "RabbitMQ transport plugin"
  image: fluidbg/rabbitmq:dev
  supportedRoles: [duplicator, splitter, observer, writer, consumer, combiner]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    drainPath: /drain
    drainStatusPath: /drain-status
    cleanupPath: /cleanup
    trafficShiftPath: /traffic
  features:
    supportsProgressiveShifting: true
  fieldNamespaces: [queue]
  configSchema:
    type: object
    properties:
      amqpUrl: { type: string }
      duplicator:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      splitter:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      combiner:
        type: object
        properties:
          outputQueue: { type: string }
          greenOutputQueue: { type: string }
          blueOutputQueue: { type: string }
          greenOutputQueueEnvVar: { type: string }
          blueOutputQueueEnvVar: { type: string }
      writer:
        type: object
        properties:
          targetQueue: { type: string }
      consumer:
        type: object
        properties:
          inputQueue: { type: string }
      observer:
        type: object
        properties:
          testId: { type: object }
          match: { type: array }
          notifyPath: { type: string }
  container:
    ports:
      - name: health
        containerPort: 9090
---
apiVersion: fluidbg.io/v1alpha1
kind: StateStore
metadata:
  name: memory-store
  namespace: fluidbg-test
spec:
  type: memory
