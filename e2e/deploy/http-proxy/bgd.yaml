apiVersion: fluidbg.io/v1alpha1
kind: BlueGreenDeployment
metadata:
  name: order-processor-http-upgrade
  namespace: fluidbg-test
spec:
  selector:
    matchLabels:
      fluidbg.io/name: order-processor
  deployment:
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: order-processor-blue
      template:
        metadata:
          labels:
            app: order-processor-blue
            fluidbg.io/name: order-processor
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: order-processor
              image: fluidbg/blue-app:dev
              imagePullPolicy: Never
              env:
                - name: AMQP_URL
                  value: amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/
                - name: INPUT_QUEUE
                  value: orders
                - name: OUTPUT_QUEUE
                  value: results
                - name: HTTP_UPSTREAM
                  value: http://httpbin.fluidbg-system/post
  candidatePatch:
    replicas: 1
  inceptionPoints:
    - name: incoming-orders
      pluginRef:
        name: rabbitmq
      roles:
        - duplicator
        - observer
      drain:
        maxWaitSeconds: 15
      config:
        duplicator:
          inputQueue: orders
          greenInputQueue: orders-green
          blueInputQueue: orders-blue
          greenInputQueueEnvVar: INPUT_QUEUE
          blueInputQueueEnvVar: INPUT_QUEUE
        observer:
          testId:
            field: queue.body
            jsonPath: $.orderId
          match:
            - field: queue.body
              jsonPath: $.action
              matches: ^http-proxy-check$
          notifyPath: /observe/{testId}/incoming-orders
    - name: http-upstream
      pluginRef:
        name: http
      roles:
        - observer
      drain:
        maxWaitSeconds: 15
      config:
        port: 9090
        realEndpoint: http://httpbin.fluidbg-system/post
        envVarName: HTTP_UPSTREAM
        writeEnvVar: HTTP_WRITE_URL
        testId:
          field: http.body
          jsonPath: $.orderId
        filters:
          - match:
              - field: http.path
                equals: /
              - field: http.body
                jsonPath: $.action
                matches: ^http-proxy-check$
            notifyPath: /observe/{testId}/http-upstream
            payload: request
    - name: outgoing-results
      pluginRef:
        name: rabbitmq
      roles:
        - combiner
        - observer
      drain:
        maxWaitSeconds: 15
      config:
        combiner:
          greenOutputQueueEnvVar: OUTPUT_QUEUE
          blueOutputQueueEnvVar: OUTPUT_QUEUE
          greenOutputQueue: results-green
          blueOutputQueue: results-blue
          outputQueue: results
        observer:
          testId:
            field: queue.body
            jsonPath: $.orderId
          match:
            - field: queue.body
              jsonPath: $.originalMessage.action
              matches: ^http-proxy-check$
          notifyPath: /observe/{testId}/outgoing-results
  test:
    name: test-container
    deployment:
      replicas: 1
      selector:
        matchLabels:
          app: test-container
      template:
        metadata:
          labels:
            app: test-container
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: test-container
              image: fluidbg/test-app:dev
              imagePullPolicy: Never
              ports:
                - containerPort: 8080
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 1
                failureThreshold: 60
              env:
                - name: PORT
                  value: "8080"
                - name: AMQP_URL
                  value: amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/
                - name: STARTUP_DELAY_SECONDS
                  value: "5"
    service:
      selector:
        app: test-container
      ports:
        - port: 8080
          targetPort: 8080
    dataVerification:
      verifyPath: /result/{testId}
      timeoutSeconds: 120
  promotion:
    data:
      minTestCases: 2
      successRate: 1.0
      timeoutSeconds: 300
    strategy:
      type: hard-switch
