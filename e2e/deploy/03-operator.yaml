apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluidbg-operator
rules:
  - apiGroups: ["fluidbg.io"]
    resources: ["inceptionplugins", "statestores", "bluegreendeployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fluidbg.io"]
    resources: ["bluegreendeployments/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluidbg-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluidbg-operator
subjects:
  - kind: ServiceAccount
    name: fluidbg-operator
    namespace: fluidbg-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
  labels:
    app: fluidbg-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluidbg-operator
  template:
    metadata:
      labels:
        app: fluidbg-operator
    spec:
      terminationGracePeriodSeconds: 1
      serviceAccountName: fluidbg-operator
      containers:
        - name: operator
          image: fluidbg/operator:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
              name: api
          env:
            - name: RUST_LOG
              value: info
            - name: FLUIDBG_NAMESPACE
              value: fluidbg-test
---
apiVersion: v1
kind: Service
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
spec:
  selector:
    app: fluidbg-operator
  ports:
    - port: 8090
      targetPort: 8090
