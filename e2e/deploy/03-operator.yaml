apiVersion: v1
kind: Secret
metadata:
  name: fluidbg-operator-auth
  namespace: fluidbg-system
type: Opaque
stringData:
  signing-key: fluidbg-e2e-signing-key
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluidbg-operator
rules:
  - apiGroups: ["fluidbg.io"]
    resources: ["inceptionplugins", "statestores", "bluegreendeployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fluidbg.io"]
    resources: ["bluegreendeployments/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluidbg-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluidbg-operator
subjects:
  - kind: ServiceAccount
    name: fluidbg-operator
    namespace: fluidbg-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluidbg-rabbitmq-manager
  namespace: fluidbg-system
  labels:
    app: fluidbg-rabbitmq-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluidbg-rabbitmq-manager
  template:
    metadata:
      labels:
        app: fluidbg-rabbitmq-manager
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: manager
          image: fluidbg/fbg-plugin-rabbitmq:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: FLUIDBG_PLUGIN_MANAGER
              value: "true"
            - name: FLUIDBG_MANAGER_AUTH_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: fluidbg-operator-auth
                  key: signing-key
            - name: FLUIDBG_RABBITMQ_MANAGER_AMQP_URL
              value: "amqp://fluidbg:fluidbg@rabbitmq.fluidbg-system:5672/%2f"
---
apiVersion: v1
kind: Service
metadata:
  name: fluidbg-rabbitmq-manager
  namespace: fluidbg-system
spec:
  selector:
    app: fluidbg-rabbitmq-manager
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
  labels:
    app: fluidbg-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluidbg-operator
  template:
    metadata:
      labels:
        app: fluidbg-operator
    spec:
      terminationGracePeriodSeconds: 1
      serviceAccountName: fluidbg-operator
      containers:
        - name: operator
          image: fluidbg/fbg-operator:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
              name: api
          env:
            - name: RUST_LOG
              value: info
            - name: FLUIDBG_NAMESPACE
              value: fluidbg-test
            - name: FLUIDBG_AUTH_SIGNING_SECRET_NAME
              value: fluidbg-operator-auth
            - name: FLUIDBG_AUTH_SIGNING_SECRET_KEY
              value: signing-key
            - name: FLUIDBG_AUTH_SIGNING_SECRET_NAMESPACE
              value: fluidbg-system
---
apiVersion: v1
kind: Service
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
spec:
  selector:
    app: fluidbg-operator
  ports:
    - port: 8090
      targetPort: 8090
