apiVersion: batch/v1
kind: Job
metadata:
  name: order-processor-trigger-failing-tests
  namespace: fluidbg-test
spec:
  ttlSecondsAfterFinished: 30
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trigger
          image: curlimages/curl:8.8.0
          command:
            - sh
            - -ec
            - |
              until curl -sf http://rabbitmq.fluidbg-system:15672 >/dev/null; do
                sleep 2
              done
              for id in fail-1 fail-2 fail-3 fail-4 fail-5; do
                curl -sf -u fluidbg:fluidbg \
                  -H 'content-type: application/json' \
                  -X POST http://rabbitmq.fluidbg-system:15672/api/exchanges/%2F/amq.default/publish \
                  -d "{\"properties\":{},\"routing_key\":\"orders\",\"payload\":\"{\\\"orderId\\\":\\\"${id}\\\",\\\"type\\\":\\\"order\\\",\\\"action\\\":\\\"process\\\",\\\"shouldPass\\\":false,\\\"failureReason\\\":\\\"synthetic failed promotion case\\\"}\",\"payload_encoding\":\"string\"}" >/dev/null
              done
