apiVersion: v1
kind: Namespace
metadata:
  name: fluidbg-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: fluidbg-demo
type: Opaque
stringData:
  rabbitmq-username: fluidbg
  rabbitmq-password: fluidbg
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: fluidbg-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: rabbitmq-username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: rabbitmq-password
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fluidbg-demo
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-flow-sink
  namespace: fluidbg-demo
  labels:
    app.kubernetes.io/part-of: order-flow-demo
    app.kubernetes.io/component: downstream-sink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-flow-sink
  template:
    metadata:
      labels:
        app: order-flow-sink
        app.kubernetes.io/part-of: order-flow-demo
        app.kubernetes.io/component: downstream-sink
    spec:
      containers:
        - name: sink
          image: fluidbg/fluidbg-example-sink:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AMQP_URL
              value: "amqp://fluidbg:fluidbg@rabbitmq.fluidbg-demo:5672/"
            - name: INPUT_QUEUE
              value: results
---
apiVersion: v1
kind: Service
metadata:
  name: order-flow-sink
  namespace: fluidbg-demo
spec:
  selector:
    app: order-flow-sink
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-flow-producer
  namespace: fluidbg-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-flow-producer
  template:
    metadata:
      labels:
        app: order-flow-producer
    spec:
      containers:
        - name: producer
          image: fluidbg/fluidbg-example-producer:dev
          imagePullPolicy: Never
          env:
            - name: AMQP_URL
              value: "amqp://fluidbg:fluidbg@rabbitmq.fluidbg-demo:5672/"
            - name: OUTPUT_QUEUE
              value: orders
            - name: INTERVAL_SECONDS
              value: "2"
---
apiVersion: fluidbg.io/v1alpha1
kind: BlueGreenDeployment
metadata:
  name: order-flow
  namespace: fluidbg-demo
spec:
  selector:
    matchLabels:
      fluidbg.io/name: order-flow
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: order-flow
      template:
        metadata:
          labels:
            app: order-flow
            fluidbg.io/name: order-flow
        spec:
          terminationGracePeriodSeconds: 1
          containers:
            - name: app
              image: fluidbg/fluidbg-example-order-app:dev
              imagePullPolicy: Never
              env:
                - name: AMQP_URL
                  value: "amqp://fluidbg:fluidbg@rabbitmq.fluidbg-demo:5672/"
                - name: INPUT_QUEUE
                  value: orders
                - name: OUTPUT_QUEUE
                  value: results
                - name: OUTPUT_PREFIX
                  value: v1
  inceptionPoints: []
  promotion:
    data:
      minTestCases: 1
      successRate: 1.0
      timeoutSeconds: 120
    strategy:
      type: hard-switch
