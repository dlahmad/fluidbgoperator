apiVersion: batch/v1
kind: Job
metadata:
  name: order-processor-trigger-tests
  namespace: fluidbg-test
spec:
  ttlSecondsAfterFinished: 30
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trigger
          image: curlimages/curl:8.8.0
          command:
            - sh
            - -ec
            - |
              until curl -sf http://rabbitmq.fluidbg-system:15672 >/dev/null; do
                sleep 2
              done
              for id in demo-1 demo-2 demo-3 demo-4 demo-5; do
                curl -sf -u fluidbg:fluidbg \
                  -H 'content-type: application/json' \
                  -X POST http://rabbitmq.fluidbg-system:15672/api/exchanges/%2F/amq.default/publish \
                  -d "{\"properties\":{},\"routing_key\":\"orders\",\"payload\":\"{\\\"orderId\\\":\\\"${id}\\\",\\\"type\\\":\\\"order\\\",\\\"action\\\":\\\"process\\\"}\",\"payload_encoding\":\"string\"}" >/dev/null
              done
