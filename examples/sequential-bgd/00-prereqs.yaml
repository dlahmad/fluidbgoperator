apiVersion: v1
kind: Namespace
metadata:
  name: fluidbg-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: fluidbg-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluidbg-operator
rules:
  - apiGroups: ["fluidbg.io"]
    resources: ["inceptionplugins", "statestores", "bluegreendeployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fluidbg.io"]
    resources: ["bluegreendeployments/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluidbg-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluidbg-operator
subjects:
  - kind: ServiceAccount
    name: fluidbg-operator
    namespace: fluidbg-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
  labels:
    app: fluidbg-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluidbg-operator
  template:
    metadata:
      labels:
        app: fluidbg-operator
    spec:
      terminationGracePeriodSeconds: 1
      serviceAccountName: fluidbg-operator
      containers:
        - name: operator
          image: fluidbg/operator:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
              name: api
          env:
            - name: RUST_LOG
              value: info
            - name: FLUIDBG_NAMESPACE
              value: fluidbg-test
---
apiVersion: v1
kind: Service
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
spec:
  selector:
    app: fluidbg-operator
  ports:
    - port: 8090
      targetPort: 8090
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: fluidbg-system
type: Opaque
stringData:
  rabbitmq-username: fluidbg
  rabbitmq-password: fluidbg
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: fluidbg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: fluidbg
            - name: RABBITMQ_DEFAULT_PASS
              value: fluidbg
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fluidbg-system
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: fluidbg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: httpbin
          image: kennethreitz/httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: fluidbg-system
spec:
  selector:
    app: httpbin
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: fluidbg.io/v1alpha1
kind: InceptionPlugin
metadata:
  name: rabbitmq
  namespace: fluidbg-test
spec:
  description: "RabbitMQ transport plugin"
  image: fluidbg/rabbitmq:dev
  supportedRoles: [duplicator, splitter, observer, writer, consumer, combiner]
  topology: standalone
  lifecycle:
    preparePath: /prepare
    cleanupPath: /cleanup
  features:
    supportsProgressiveShifting: true
  fieldNamespaces: [queue]
  configSchema:
    type: object
    properties:
      amqpUrl: { type: string }
      duplicator:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      splitter:
        type: object
        properties:
          inputQueue: { type: string }
          greenInputQueue: { type: string }
          blueInputQueue: { type: string }
          greenInputQueueEnvVar: { type: string }
          blueInputQueueEnvVar: { type: string }
      combiner:
        type: object
        properties:
          outputQueue: { type: string }
          greenOutputQueue: { type: string }
          blueOutputQueue: { type: string }
          greenOutputQueueEnvVar: { type: string }
          blueOutputQueueEnvVar: { type: string }
      writer:
        type: object
        properties:
          targetQueue: { type: string }
      consumer:
        type: object
        properties:
          inputQueue: { type: string }
      observer:
        type: object
        properties:
          testId: { type: object }
          match: { type: array }
          notifyPath: { type: string }
  container:
    ports:
      - name: health
        containerPort: 9090
---
apiVersion: fluidbg.io/v1alpha1
kind: StateStore
metadata:
  name: memory-store
  namespace: fluidbg-test
spec:
  type: memory
