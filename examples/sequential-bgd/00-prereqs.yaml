apiVersion: v1
kind: Namespace
metadata:
  name: fluidbg-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: fluidbg-test
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: fluidbg-system
type: Opaque
stringData:
  rabbitmq-username: fluidbg
  rabbitmq-password: fluidbg
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: fluidbg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: fluidbg
            - name: RABBITMQ_DEFAULT_PASS
              value: fluidbg
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fluidbg-system
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: fluidbg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: httpbin
          image: kennethreitz/httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: fluidbg-system
spec:
  selector:
    app: httpbin
  ports:
    - port: 80
      targetPort: 80
