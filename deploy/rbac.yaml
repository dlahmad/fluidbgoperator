apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluidbg-operator
  namespace: fluidbg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluidbg-operator
rules:
  - apiGroups: ["fluidbg.io"]
    resources: ["inceptionplugins", "statestores", "bluegreendeployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fluidbg.io"]
    resources: ["bluegreendeployments/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluidbg-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluidbg-operator
subjects:
  - kind: ServiceAccount
    name: fluidbg-operator
    namespace: fluidbg-system
---
apiVersion: v1
kind: Secret
metadata:
  name: fluidbg-operator-auth
  namespace: fluidbg-system
type: Opaque
stringData:
  signing-key: change-me-before-production
